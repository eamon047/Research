conve:
  convolution_bias: false
  entity_embedder:
    dropout: -0.39352502744898676
    regularize_weight: 4.810499742453031e-16
  feature_map_dropout: 0.46509686997720195
  projection_dropout: 0.1835690327311472
  relation_embedder:
    dropout: -0.05573726292688552
    regularize_weight: 6.319374457425122e-14
  round_dim: true
dataset:
  name: wn18
  num_entities: 40943
  num_relations: 18
entity_ranking:
  metrics_per:
    relation_type: true
eval:
  batch_size: 256
import:
- conve
- reciprocal_relations_model
lookup_embedder:
  dim: 128
  initialize: xavier_normal_
  initialize_args:
    normal_:
      mean: 0.0
      std: 0.0059367982968749735
    uniform_:
      a: -0.6863654669693099
    xavier_normal_:
      gain: 1.0
    xavier_uniform_:
      gain: 1.0
  regularize: ''
model: reciprocal_relations_model
negative_sampling:
  implementation: batch
reciprocal_relations_model:
  base_model:
    entity_embedder:
      dim: 128
    relation_embedder:
      dim: 128
train:
  auto_correct: true
  batch_size: 1024
  loss_arg: .nan
  lr_scheduler: ReduceLROnPlateau
  lr_scheduler_args:
    factor: 0.95
    mode: max
    patience: 6
    threshold: 0.0001
  max_epochs: 400
  optimizer: Adam
  optimizer_args:
    lr: 0.0010012998397037178
  type: 1vsAll
valid:
  early_stopping:
    min_threshold:
      epochs: 50
      metric_value: 0.05
    patience: 10
