dataset:
  name: wn18
  num_entities: 40943
  num_relations: 18
distmult:
  entity_embedder:
    dropout: -0.47765377159982886
    regularize_weight: 7.95620960423552e-16
  relation_embedder:
    dropout: 0.04761411718936126
    regularize_weight: 7.377492941887899e-19
entity_ranking:
  metrics_per:
    relation_type: true
eval:
  batch_size: 256
import:
- distmult
- reciprocal_relations_model
lookup_embedder:
  dim: 512
  initialize_args:
    normal_:
      mean: 0.0
      std: 0.00037098133561850986
    uniform_:
      a: -0.3466218517887806
    xavier_normal_:
      gain: 1.0
    xavier_uniform_:
      gain: 1.0
  regularize_args:
    p: 3
model: reciprocal_relations_model
negative_sampling:
  implementation: batch
reciprocal_relations_model:
  base_model:
    type: distmult
train:
  auto_correct: true
  batch_size: 128
  loss_arg: .nan
  lr_scheduler: ReduceLROnPlateau
  lr_scheduler_args:
    factor: 0.95
    mode: max
    patience: 6
    threshold: 0.0001
  max_epochs: 400
  optimizer_args:
    lr: 0.01491283384545359
  type: 1vsAll
valid:
  early_stopping:
    min_threshold:
      epochs: 50
      metric_value: 0.05
    patience: 10
